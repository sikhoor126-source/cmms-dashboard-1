<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CMMS Medical Equipment</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<!-- DataTables -->
<link rel="stylesheet"
href="https://cdn.datatables.net/2.3.2/css/dataTables.dataTables.min.css">

<!-- CSS -->
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="wrapper">

    <!-- Sidebar -->
    <aside id="sidebar">

        <div class="logo">

            <i class="fa-solid fa-hospital"></i>

            <h3>CMMS</h3>

            <small>Medical Equipment</small>

        </div>

        <ul class="menu">

            <li class="active">
                <i class="fa-solid fa-chart-line"></i>
                Dashboard
            </li>

            <li>
                <i class="fa-solid fa-laptop-medical"></i>
                เครื่องมือแพทย์
            </li>

            <li>
                <i class="fa-solid fa-screwdriver-wrench"></i>
                งานซ่อม
            </li>

            <li>
                <i class="fa-solid fa-calendar-check"></i>
                PM
            </li>

            <li>
                <i class="fa-solid fa-ruler-combined"></i>
                Calibration
            </li>

            <li>
                <i class="fa-solid fa-file-lines"></i>
                รายงาน
            </li>

            <li>
                <i class="fa-solid fa-gear"></i>
                ตั้งค่า
            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main id="content">

        <!-- Header -->

        <header>

            <div>

                <h2>

                    Dashboard

                </h2>

                <small id="updateTime">

                    Loading...

                </small>

            </div>

            <div>

                <button class="btn btn-primary">

                    <i class="fa-solid fa-rotate"></i>

                    Refresh

                </button>

            </div>

        </header>

        <!-- KPI -->

        <div class="row g-3 mt-2">

            <div class="col-lg-3">

                <div class="kpi">

                    <div class="icon bg-primary">

                        <i class="fa-solid fa-laptop-medical"></i>

                    </div>

                    <h1 id="totalEquipment">0</h1>

                    <p>เครื่องมือทั้งหมด</p>

                </div>

            </div>

            <div class="col-lg-3">

                <div class="kpi">

                    <div class="icon bg-success">

                        <i class="fa-solid fa-circle-check"></i>

                    </div>

                    <h1 id="readyEquipment">0</h1>

                    <p>พร้อมใช้งาน</p>

                </div>

            </div>

            <div class="col-lg-3">

                <div class="kpi">

                    <div class="icon bg-danger">

                        <i class="fa-solid fa-screwdriver-wrench"></i>

                    </div>

                    <h1 id="repairEquipment">0</h1>

                    <p>รอซ่อม</p>

                </div>

            </div>

            <div class="col-lg-3">

                <div class="kpi">

                    <div class="icon bg-warning">

                        <i class="fa-solid fa-shield-halved"></i>

                    </div>

                    <h1 id="warrantyEquipment">0</h1>

                    <p>ประกันใกล้หมด</p>

                </div>

            </div>

        </div>

        <!-- Charts -->

        <div class="row mt-4">

            <div class="col-lg-8">

                <div class="card p-3">

                    <h5>สถานะเครื่องมือ</h5>

                    <canvas id="statusChart"></canvas>

                </div>

            </div>

            <div class="col-lg-4">

                <div class="card p-3">

                    <h5>ประเภทเครื่องมือ</h5>

                    <canvas id="categoryChart"></canvas>

                </div>

            </div>

        </div>

        <!-- Table -->

        <div class="card mt-4 p-3">

            <h5>รายการครุภัณฑ์</h5>

            <table id="equipmentTable" class="display">

                <thead>

                <tr>

                    <th>รูป</th>

                    <th>รหัส</th>

                    <th>ชื่อเครื่อง</th>

                    <th>ประเภท</th>

                    <th>สถานะ</th>

                    <th>หน่วยงาน</th>

                </tr>

                </thead>

            </table>

        </div>

    </main>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.datatables.net/2.3.2/js/dataTables.min.js"></script>

<script src="js/api.js"></script>

<script src="js/app.js"></script>

<script src="js/dashboard.js"></script>

<script src="js/equipment.js"></script>

</body>

</html>
